<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>grebase — git rebase without the fear</title>
<desc>grebase logo built from a git branch diagram forming the letter G, with install command and sample output</desc>

<!-- background -->
<rect width="680" height="420" rx="16" fill="#0d1117"/>

<!-- ── git branch diagram forming the G ── -->

<!-- main branch line -->
<line x1="72" y1="200" x2="228" y2="200" stroke="#2f81f7" stroke-width="2.5"/>

<!-- feature branch arc -->
<path d="M 104 200 Q 104 128 152 108 L 204 108 Q 228 108 228 132 L 228 200"
      stroke="#3fb950" stroke-width="2.5" fill="none"/>

<!-- G crossbar -->
<line x1="190" y1="200" x2="228" y2="200" stroke="#2f81f7" stroke-width="3.5"/>

<!-- vertical dashed re-attach above -->
<line x1="152" y1="108" x2="152" y2="74" stroke="#3fb950" stroke-width="1.8"
      stroke-dasharray="4 3"/>

<!-- fading rebased commits floating up -->
<circle cx="152" cy="66" r="6" fill="#3fb950" opacity="0.35"/>
<circle cx="152" cy="48" r="4" fill="#3fb950" opacity="0.18"/>

<!-- main branch nodes -->
<circle cx="104" cy="200" r="9" fill="#0d1117" stroke="#2f81f7" stroke-width="2.2"/>
<circle cx="152" cy="200" r="9" fill="#0d1117" stroke="#2f81f7" stroke-width="2.2"/>
<circle cx="200" cy="200" r="9" fill="#0d1117" stroke="#2f81f7" stroke-width="2.2"/>
<circle cx="228" cy="200" r="9" fill="#2f81f7"/>

<!-- feature branch nodes -->
<circle cx="152" cy="108" r="9" fill="#0d1117" stroke="#3fb950" stroke-width="2.2"/>
<circle cx="198" cy="108" r="9" fill="#3fb950"/>

<!-- hash labels -->
<text x="104" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58">a1f</text>
<text x="152" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58">b2e</text>
<text x="200" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58">c3d</text>
<text x="228" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58">d4c</text>
<text x="152" y="96"  text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58">f1ʼ</text>
<text x="198" y="96"  text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58">f2ʼ</text>

<!-- branch badge: main -->
<rect x="62" y="213" width="40" height="17" rx="4" fill="#161b22" stroke="#2f81f7" stroke-width="0.8"/>
<text x="82" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#2f81f7">main</text>

<!-- branch badge: feature -->
<rect x="126" y="76" width="54" height="17" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="0.8"/>
<text x="153" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950">feature</text>

<!-- ── wordmark: grebase ── -->
<text x="268" y="178" font-family="monospace" font-size="72" font-weight="500" fill="#e6edf3">g</text>
<text x="320" y="178" font-family="monospace" font-size="52" font-weight="400" fill="#e6edf3">rebase</text>

<!-- tagline -->
<text x="268" y="210" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
      font-size="15" fill="#848d97">git rebase without the fear.</text>

<!-- divider -->
<line x1="268" y1="228" x2="630" y2="228" stroke="#21262d" stroke-width="1"/>

<!-- install command -->
<rect x="268" y="242" width="258" height="36" rx="6" fill="#161b22" stroke="#21262d" stroke-width="0.8"/>
<text x="284" y="265" font-family="monospace" font-size="13" fill="#3fb950">$ pipx install grebase</text>

<!-- run command -->
<rect x="268" y="288" width="188" height="36" rx="6" fill="#161b22" stroke="#21262d" stroke-width="0.8"/>
<text x="284" y="311" font-family="monospace" font-size="13" fill="#3fb950">$ grebase main</text>

<!-- sample terminal output -->
<text x="268" y="354" font-family="monospace" font-size="11" fill="#3fb950">✓  import conflict — auto-resolved</text>
<text x="268" y="372" font-family="monospace" font-size="11" fill="#3fb950">✓  yarn.lock — regenerated</text>
<text x="268" y="390" font-family="monospace" font-size="11" fill="#d29922">?  utils.ts — your call</text>

</svg>
